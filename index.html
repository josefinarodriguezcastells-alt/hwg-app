<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWG Talent — Form Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F9F6F1; font-family: 'DM Sans', sans-serif; color: #0F0F0F; }
    :root {
      --punch: #6C3BFF;
      --punch-light: #F0EBFF;
      --lime: #C8F135;
      --ink: #0F0F0F;
      --warm: #F9F6F1;
      --gray: #6B7280;
      --dark: #374151;
      --white: #ffffff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    function Spinner() {
      return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16,padding:'40px 0'}}>
          <div style={{width:36,height:36,border:'3px solid #ebebeb',borderTopColor:'#6C3BFF',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
          <span style={{color:'#888',fontSize:15}}>Claude está analizando el CV...</span>
        </div>
      );
    }

    function SnapRow({label, value, accent}) {
      const ok = !value.includes('[COMPLETAR]');
      return (
        <div style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid #f0f0f0',alignItems:'flex-start'}}>
          <span style={{fontSize:16,minWidth:22}}>{ok ? '✅' : '⬜'}</span>
          <span style={{fontWeight:700,minWidth:170,fontSize:14,color:'#374151',flexShrink:0}}>{label}</span>
          <span style={{fontSize:14,color:'#0F0F0F'}}>{value}</span>
        </div>
      );
    }

    function ResultView({data, lang}) {
      const [copied, setCopied] = useState(false);
      const [personal, setPersonal] = useState({
        position: data.personal?.position || '[COMPLETAR]',
        linkedin: data.personal?.linkedin || '[COMPLETAR]',
        phone: data.personal?.phone || '[COMPLETAR]',
        email: data.personal?.email || '[COMPLETAR]',
      });
      const isEs = lang === 'es';
      const today = new Date().toLocaleDateString(isEs ? 'es-AR' : 'en-US', {day:'2-digit',month:'long',year:'numeric'});

      const labels = isEs
        ? {techFit:'Fit técnico', exp:'Experiencia', cult:'Culture fit', lang:'Idiomas', avail:'Disponibilidad', salary:'Pretensión salarial', tools:'Tools & Herramientas', tool:'Herramienta', years:'Años', level:'Nivel & contexto', why:'El candidato/a en 3 líneas'}
        : {techFit:'Technical fit', exp:'Experience', cult:'Culture fit', lang:'Languages', avail:'Availability', salary:'Salary expectation', tools:'Tools & Stack', tool:'Tool', years:'Years', level:'Level & context', why:'The candidate in 3 lines'};

      const personalLabels = isEs
        ? {position:'Posición', date:'Fecha de presentación', linkedin:'LinkedIn', phone:'Teléfono', email:'Mail'}
        : {position:'Position', date:'Presentation date', linkedin:'LinkedIn', phone:'Phone', email:'Email'};

      const updatePersonal = (key, val) => setPersonal(p => ({...p, [key]: val}));

      const inputStyle = {
        border:'none', borderBottom:'1.5px dashed #d0d0d0', outline:'none',
        fontSize:14, fontFamily:'DM Sans,sans-serif', color:'#0F0F0F',
        background:'transparent', padding:'2px 4px', width:'100%'
      };

      const copyText = () => {
        const txt = `${data.name}\n${data.role} · ${data.location}\n\n${Object.entries({[labels.techFit]:data.snapshot.techFit,[labels.exp]:data.snapshot.exp,[labels.cult]:data.snapshot.cult,[labels.lang]:data.snapshot.lang,[labels.avail]:data.snapshot.avail,[labels.salary]:data.snapshot.salary}).map(([k,v])=>`✅ ${k}: ${v}`).join('\n')}\n\n${labels.tools}\n${data.tools.map(t=>`${t.tool} | ${t.years} | ${t.level}`).join('\n')}\n\n${labels.why}\n${data.why}\n\nHWG Talent Consultants · ${today}\nwww.hwgtalent.com`;
        navigator.clipboard.writeText(txt);
        setCopied(true);
        setTimeout(()=>setCopied(false), 2000);
      };

      const sectionPill = (text) => (
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'#6C3BFF',marginBottom:10,paddingLeft:10,borderLeft:'4px solid #C8F135',marginTop:24}}>
          {text}
        </div>
      );

      const downloadWord = async () => {
        try {
          const res = await fetch('/api/docx', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data: {...data, personal}, lang, today})
          });
          if (!res.ok) throw new Error('Error generando documento');
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${data.name.replace(/\s+/g, '_')}_HWG.docx`;
          a.click();
          URL.revokeObjectURL(url);
        } catch(e) {
          alert('Error al descargar. Intentá de nuevo.');
        }
      };

      return (
        <div className="fade-in" style={{background:'#fff',borderRadius:16,padding:32,border:'2px solid #6C3BFF',boxShadow:'0 0 0 4px #6C3BFF18',marginTop:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,fontFamily:"'DM Serif Display',serif",lineHeight:1.2}}>{data.name}</div>
              <div style={{color:'#888',fontSize:14,marginTop:4}}>{data.role} · {data.location} · {data.modality}</div>
            </div>
  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button onClick={downloadWord} style={{padding:'9px 18px',background:'#0F0F0F',border:'none',color:'#C8F135',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif',whiteSpace:'nowrap'}}>
                ⬇ Descargar Word
              </button>
              <button onClick={copyText} style={{padding:'9px 18px',background:'#F9F6F1',border:'1.5px solid #6C3BFF',color:'#6C3BFF',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif',whiteSpace:'nowrap'}}>
                {copied ? '✓ Copiado' : 'Copiar texto'}
              </button>
            </div>
          </div>

          {sectionPill(isEs ? 'Información personal' : 'Personal Information')}
          {[
            [personalLabels.position, 'position'],
            [personalLabels.date, null],
            [personalLabels.linkedin, 'linkedin'],
            [personalLabels.phone, 'phone'],
            [personalLabels.email, 'email'],
          ].map(([label, key], i) => (
            <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid #f0f0f0',alignItems:'center'}}>
              <span style={{fontWeight:700,minWidth:170,fontSize:14,color:'#374151',flexShrink:0}}>{label}</span>
              {key
                ? <input style={inputStyle} value={personal[key]} onChange={e=>updatePersonal(key, e.target.value)} />
                : <span style={{fontSize:14,color:'#0F0F0F'}}>{today}</span>
              }
            </div>
          ))}

          {sectionPill('Quick Snapshot')}
          {[
            [labels.techFit, data.snapshot.techFit],
            [labels.exp,     data.snapshot.exp],
            [labels.cult,    data.snapshot.cult],
            [labels.lang,    data.snapshot.lang],
            [labels.avail,   data.snapshot.avail],
            [labels.salary,  data.snapshot.salary],
          ].map(([l,v],i) => <SnapRow key={i} label={l} value={v} />)}

          {sectionPill(labels.tools)}
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:14,marginBottom:8}}>
            <thead>
              <tr style={{borderBottom:'2px solid #6C3BFF'}}>
                {[labels.tool, labels.years, labels.level].map((h,i)=>(
                  <th key={i} style={{textAlign:i===1?'center':'left',padding:'6px 10px',color:'#888',fontWeight:600,fontSize:12}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {data.tools.map((row,i)=>(
                <tr key={i} style={{background:i%2===0?'#F9F6F1':'#fff'}}>
                  <td style={{padding:'9px 10px',fontWeight:700}}>{row.tool}</td>
                  <td style={{padding:'9px 10px',textAlign:'center',color:'#6C3BFF',fontWeight:700}}>{row.years}</td>
                  <td style={{padding:'9px 10px',color:'#6b7280'}}>{row.level}</td>
                </tr>
              ))}
            </tbody>
          </table>

          {sectionPill(labels.why)}
          <div style={{background:'#F9F6F1',borderLeft:'4px solid #C8F135',padding:'14px 18px',borderRadius:'0 8px 8px 0',fontSize:15,lineHeight:1.7,color:'#374151',fontStyle:'italic',marginBottom:20}}>
            {data.why}
          </div>

          <div style={{textAlign:'center',borderTop:'1px solid #ebebeb',paddingTop:16}}>
            <div style={{color:'#999',fontSize:13}}>
              {isEs ? 'Presentado por' : 'Presented by'} <strong style={{color:'#0F0F0F'}}>HWG Talent Consultants</strong> · {today}
            </div>
            <div style={{color:'#6C3BFF',fontWeight:700,fontSize:13,marginTop:2}}>www.hwgtalent.com</div>
          </div>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState('es');
      const [file, setFile] = useState(null);
      const [fileText, setFileText] = useState('');
      const [notes, setNotes] = useState('');
      const [position, setPosition] = useState('');
      const [drag, setDrag] = useState(false);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const fileRef = useRef();

      const readFile = useCallback(async (f) => {
        setFile(f); setResult(null);
        if (f.type === 'application/pdf' || f.name.endsWith('.pdf')) {
          try {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const arrayBuffer = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              fullText += content.items.map(item => item.str).join(' ') + '\n';
            }
            setFileText(fullText || `[Archivo: ${f.name}]`);
          } catch(e) {
            setFileText(`[Archivo: ${f.name} — no se pudo leer el PDF]`);
          }
        } else {
          const text = await f.text().catch(() => '');
          setFileText(text || `[Archivo: ${f.name}]`);
        }
      }, []);

      const onDrop = useCallback((e) => {
        e.preventDefault(); setDrag(false);
        const f = e.dataTransfer.files[0];
        if (f) readFile(f);
      }, [readFile]);

      const generate = async () => {
        if (!file) { setError(lang === 'es' ? 'Por favor subí un CV antes de continuar.' : 'Please upload a CV before continuing.'); return; }
        setError(null); setLoading(true); setResult(null);

        try {
          const formData = new FormData();
          formData.append('cv', file);
          formData.append('notes', notes);
          formData.append('lang', lang);
          formData.append('position', position);

          const res = await fetch('/api/generate', {
            method: 'POST',
            body: formData
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          const raw = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
          const parsed = JSON.parse(raw);
          if (!parsed.personal) parsed.personal = {};
          parsed.personal.position = position || '[COMPLETAR]';
          setResult(parsed);
        } catch(e) {
          setError(e.message || 'Hubo un error al procesar el CV. Intentá de nuevo.');
        } finally { setLoading(false); }
      };

      const btnStyle = (active) => ({
        flex:1, padding:'12px', borderRadius:10,
        border: active ? '2px solid #6C3BFF' : '2px solid #ebebeb',
        background: active ? '#F0EBFF' : '#fff',
        color: active ? '#6C3BFF' : '#666',
        fontWeight: active ? 700 : 400,
        fontSize:15, cursor:'pointer', fontFamily:'DM Sans,sans-serif', transition:'all 0.15s'
      });

      return (
        <div style={{minHeight:'100vh',background:'#F9F6F1'}}>
          {/* Header */}
          <div style={{background:'#0F0F0F',padding:'18px 40px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontWeight:700,fontSize:22,color:'#fff'}}>
              <span style={{color:'#C8F135'}}>HWG</span> Talent Consultants
            </div>
            <div style={{color:'#666',fontSize:13}}>CV → Presentación</div>
          </div>

          {/* Main */}
          <div style={{maxWidth:760,margin:'0 auto',padding:'48px 24px 80px'}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(28px,5vw,40px)',fontWeight:800,lineHeight:1.1,marginBottom:12}}>
              CV → Presentación<br/><span style={{color:'#6C3BFF'}}>en 10 segundos.</span>
            </div>
            <div style={{color:'#666',fontSize:16,marginBottom:40,lineHeight:1.6}}>
              Subí el CV, elegí el idioma, y la presentación HWG sale lista.
            </div>

            {/* Lang */}
            <div style={{background:'#fff',borderRadius:16,padding:28,marginBottom:20,border:'1.5px solid #ebebeb'}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'#6C3BFF',marginBottom:14}}>Idioma de salida</div>
              <div style={{display:'flex',gap:12}}>
                <button style={btnStyle(lang==='es')} onClick={()=>setLang('es')}>🇦🇷 Español</button>
                <button style={btnStyle(lang==='en')} onClick={()=>setLang('en')}>🇺🇸 English</button>
              </div>
            </div>

            {/* Upload */}
            <div style={{background:'#fff',borderRadius:16,padding:28,marginBottom:20,border:'1.5px solid #ebebeb'}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'#6C3BFF',marginBottom:14}}>CV</div>
              <div
                style={{border:`2px dashed ${drag?'#6C3BFF':'#d0d0d0'}`,borderRadius:12,padding:'36px 20px',textAlign:'center',background:drag?'#F0EBFF':'#F9F6F1',cursor:'pointer',transition:'all 0.2s'}}
                onDragOver={e=>{e.preventDefault();setDrag(true)}}
                onDragLeave={()=>setDrag(false)}
                onDrop={onDrop}
                onClick={()=>fileRef.current.click()}
              >
                <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.txt" style={{display:'none'}} onChange={e=>e.target.files[0]&&readFile(e.target.files[0])}/>
                <div style={{fontSize:32,marginBottom:8}}>📄</div>
                {file
                  ? <span style={{display:'inline-flex',alignItems:'center',gap:8,background:'#F0EBFF',color:'#6C3BFF',padding:'6px 14px',borderRadius:20,fontSize:13,fontWeight:700}}>✓ {file.name}</span>
                  : <div style={{color:'#666',fontSize:14,lineHeight:1.6}}>Arrastrá el archivo acá o <strong style={{color:'#6C3BFF'}}>hacé click para seleccionar</strong><br/><span style={{fontSize:12,color:'#aaa'}}>PDF, Word o TXT</span></div>
                }
              </div>

              {/* Notes */}
              <div style={{marginTop:20}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'#6C3BFF',marginBottom:10}}>
                  Posición para la que se presenta <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'#bbb'}}>— opcional</span>
                </div>
                <input
                  type="text"
                  value={position}
                  onChange={e=>setPosition(e.target.value)}
                  placeholder="Ej: Data Analyst Senior · Empresa XYZ"
                  style={{width:'100%',padding:'12px 14px',border:'1.5px solid #e0e0e0',borderRadius:10,fontSize:14,fontFamily:'DM Sans,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:16}}
                />
                <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'#999',marginBottom:10}}>
                  Notas o contexto adicional <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'#bbb'}}>— opcional</span>
                </div>
                <textarea
                  style={{width:'100%',minHeight:100,padding:14,border:'1.5px dashed #e0e0e0',borderRadius:10,fontSize:14,lineHeight:1.6,resize:'vertical',fontFamily:'DM Sans,sans-serif',color:'#0F0F0F',background:'#F9F6F1',outline:'none'}}
                  placeholder={lang==='es' ? 'Ej: Lo conozco de una búsqueda anterior, es muy proactivo. Busca proyecto con impacto real...' : 'E.g.: I know him from a previous search, very proactive. Looking for real impact...'}
                  value={notes}
                  onChange={e=>setNotes(e.target.value)}
                />
              </div>

              {error && <div style={{background:'#fff0f0',border:'1.5px solid #fca5a5',borderRadius:10,padding:'14px 18px',color:'#991b1b',fontSize:14,marginTop:16}}>{error}</div>}

              <button
                onClick={generate}
                disabled={loading}
                style={{width:'100%',padding:18,background:loading?'#ccc':'#0F0F0F',color:loading?'#888':'#C8F135',border:'none',borderRadius:12,fontSize:17,fontWeight:800,cursor:loading?'not-allowed':'pointer',fontFamily:"'DM Serif Display',serif",marginTop:16,transition:'all 0.2s'}}
              >
                {loading ? 'Generando...' : lang==='es' ? 'Generar presentación →' : 'Generate presentation →'}
              </button>
            </div>

            {loading && <Spinner />}
            {result && !loading && <ResultView data={result} lang={lang} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
